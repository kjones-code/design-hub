<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Property Care Design Hub</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --brand-light:#C5D1EB;
    --brand-blue:#92AFD7;
    --brand-slate:#5A7684;
    --brand-granite:#395B50;
    --brand-dark:#1F2F16;
    --radius-md:8px;
    --radius-lg:12px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f3;min-height:100vh;padding:2rem 1rem;}
  .page{max-width:1100px;margin:0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;background:var(--brand-dark);border-radius:var(--radius-lg);margin-bottom:1.25rem;gap:12px;flex-wrap:wrap;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .logo-mark{width:36px;height:36px;border-radius:var(--radius-md);background:var(--brand-granite);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .logo-mark svg{width:20px;height:20px;}
  .topbar-left h1{font-size:16px;font-weight:500;color:#fff;}
  .topbar-left p{font-size:12px;color:var(--brand-light);margin-top:2px;opacity:0.8;}
  .add-btn{font-size:13px;padding:8px 16px;border-radius:var(--radius-md);border:0.5px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;white-space:nowrap;}
  .add-btn:hover{background:rgba(255,255,255,0.18);}
  .config-banner{background:var(--brand-light);border:0.5px solid var(--brand-blue);border-radius:var(--radius-md);padding:0.75rem 1rem;margin-bottom:1.25rem;font-size:13px;color:var(--brand-dark);}
  .config-banner a{color:var(--brand-slate);cursor:pointer;text-decoration:underline;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
  .stat{background:var(--brand-light);border-radius:var(--radius-md);padding:0.75rem 1rem;}
  .stat-label{font-size:11px;color:var(--brand-slate);margin-bottom:4px;font-weight:500;}
  .stat-val{font-size:22px;font-weight:500;color:var(--brand-dark);}
  .toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
  .toolbar input{flex:1;min-width:180px;font-size:13px;padding:8px 12px;border:0.5px solid #ccc;border-radius:var(--radius-md);background:#fff;color:#1a1a1a;outline:none;}
  .toolbar input:focus{border-color:var(--brand-slate);}
  .toolbar select{font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:var(--radius-md);background:#fff;color:#1a1a1a;cursor:pointer;outline:none;}
  .pill-row{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
  .card{background:#fff;border:0.5px solid #e0e0e0;border-radius:var(--radius-lg);padding:1rem 1.25rem;display:flex;flex-direction:column;gap:8px;}
  .card-top{display:flex;align-items:center;justify-content:space-between;}
  .card-title{font-size:14px;font-weight:500;color:#1a1a1a;line-height:1.4;}
  .card-desc{font-size:12px;color:#666;line-height:1.5;}
  .type-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;display:inline-block;margin-top:4px;background:#D3D1C7;color:#444441;}
  .card-footer{display:flex;align-items:center;justify-content:space-between;border-top:0.5px solid #eee;padding-top:10px;margin-top:auto;}
  .designer{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;}
  .avatar{width:22px;height:22px;border-radius:50%;background:var(--brand-granite);color:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;}
  .designer-name{color:var(--brand-granite);}
  .open-btn{font-size:11px;color:var(--brand-slate);border:0.5px solid var(--brand-blue);border-radius:var(--radius-md);padding:4px 10px;text-decoration:none;cursor:pointer;background:transparent;}
  .open-btn:hover{background:var(--brand-light);color:var(--brand-dark);}
  .del-btn{font-size:11px;color:#999;border:none;background:none;cursor:pointer;padding:2px 4px;opacity:0.4;line-height:1;}
  .del-btn:hover{opacity:1;color:#c0392b;}
  .empty{text-align:center;padding:3rem 0;color:#999;font-size:14px;grid-column:1/-1;}
  .loading{text-align:center;padding:2rem;color:#999;font-size:13px;grid-column:1/-1;}
  .modal-wrap{display:none;margin-bottom:1.25rem;}
  .modal-wrap.open{display:block;}
  .modal{background:#fff;border:0.5px solid #ccc;border-radius:var(--radius-lg);padding:1.25rem;}
  .modal h2{font-size:16px;font-weight:500;margin-bottom:1rem;color:#1a1a1a;}
  .form-row{margin-bottom:12px;}
  .form-row label{display:block;font-size:12px;color:#666;margin-bottom:4px;}
  .form-row input,.form-row select{width:100%;font-size:13px;padding:8px 10px;border:0.5px solid #ccc;border-radius:var(--radius-md);background:#fff;color:#1a1a1a;outline:none;}
  .form-row input:focus,.form-row select:focus{border-color:var(--brand-slate);}
  .form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-actions{display:flex;gap:8px;margin-top:1rem;}
  .btn-primary{font-size:13px;padding:8px 16px;border-radius:var(--radius-md);border:none;background:var(--brand-granite);color:#fff;cursor:pointer;font-weight:500;}
  .btn-primary:hover{background:var(--brand-dark);}
  .btn-cancel{font-size:13px;padding:8px 16px;border-radius:var(--radius-md);border:0.5px solid #ccc;background:transparent;color:#666;cursor:pointer;}
  @media(max-width:600px){.form-2col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="page">

  <div id="config-banner" class="config-banner" style="display:none">
    Airtable is not yet connected. <a onclick="showConfig()">Click here to add your API credentials</a> — links will save locally in your browser until connected.
  </div>

  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">
        <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z" fill="#C5D1EB"/>
        </svg>
      </div>
      <div>
        <h1>Property Care Design Hub</h1>
        <p>Figma Make + Prototype links for customer on-sites</p>
      </div>
    </div>
    <button class="add-btn" onclick="toggleForm()">+ Add link</button>
  </div>

  <div class="modal-wrap" id="form-wrap">
    <div class="modal">
      <h2>Add a new link</h2>
      <div class="form-2col">
        <div class="form-row">
          <label>Project name</label>
          <input type="text" id="f-title" placeholder="e.g. Stop sequence planner" />
        </div>
        <div class="form-row">
          <label>Link type</label>
          <select id="f-type">
            <option value="Figma Make">Figma Make</option>
            <option value="Prototype">Prototype</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>URL</label>
        <input type="url" id="f-url" placeholder="https://figma.com/..." />
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Designer name</label>
          <input type="text" id="f-designer" placeholder="e.g. Sara R." />
        </div>
        <div class="form-row">
          <label>Category / flow</label>
          <select id="f-category">
            <option value="Route Optimization">Route Optimization</option>
            <option value="Chemical Tracking">Chemical Tracking</option>
            <option value="Recurring Services">Recurring Services</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label>Short description (optional)</label>
        <input type="text" id="f-desc" placeholder="e.g. Enterprise tier, Q2 initiative" />
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="addLink()">Save link</button>
        <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="config-modal" class="modal-wrap">
    <div class="modal">
      <h2>Connect Airtable</h2>
      <div class="form-row">
        <label>Airtable Personal Access Token</label>
        <input type="text" id="at-token" placeholder="patXXXXXXXXXXXXXX" />
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label>Base ID</label>
          <input type="text" id="at-base" placeholder="appXXXXXXXXXXXXXX" />
        </div>
        <div class="form-row">
          <label>Table name</label>
          <input type="text" id="at-table" placeholder="Design Links" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="saveConfig()">Connect</button>
        <button class="btn-cancel" onclick="hideConfig()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search projects, designers..." oninput="render()" />
    <select id="filter-type" onchange="render()">
      <option value="">All types</option>
      <option value="Figma Make">Figma Make</option>
      <option value="Prototype">Prototype</option>
    </select>
  </div>

  <div class="pill-row" id="pill-row"></div>
  <div class="grid" id="grid"></div>

</div>
<script>
const CAT_COLORS={
  'Route Optimization':{bg:'#C5D1EB',txt:'#1F2F16'},
  'Chemical Tracking':{bg:'#FAEEDA',txt:'#633806'},
  'Recurring Services':{bg:'#E1F5EE',txt:'#085041'},
};
function getCatStyle(cat){return CAT_COLORS[cat]||{bg:'#D3D1C7',txt:'#444441'};}

const SAMPLE=[
  {id:'s1',title:'Stop sequence planner',type:'Figma Make',url:'https://figma.com',designer:'Sara R.',category:'Route Optimization',desc:'Enterprise tier',date:'Apr 12'},
  {id:'s2',title:'Product usage log',type:'Prototype',url:'https://figma.com',designer:'Jamie K.',category:'Chemical Tracking',desc:'Compliance · Q2 initiative',date:'Apr 10'},
  {id:'s3',title:'Service schedule builder',type:'Figma Make',url:'https://figma.com',designer:'Mia L.',category:'Recurring Services',desc:'Mid-market accounts',date:'Apr 8'},
  {id:'s4',title:'Driver map view',type:'Prototype',url:'https://figma.com',designer:'Sara R.',category:'Route Optimization',desc:'Mobile · SMB tier',date:'Apr 5'},
];

let links=[],activeCat='All',atConfig=null,isLoading=false;

function initials(n){return n.split(' ').map(p=>p[0]||'').join('').slice(0,2).toUpperCase();}
function fmtDate(d){try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return d||'';}}
function toggleForm(){document.getElementById('form-wrap').classList.toggle('open');}
function showConfig(){document.getElementById('config-modal').classList.add('open');}
function hideConfig(){document.getElementById('config-modal').classList.remove('open');}

function saveConfig(){
  const token=document.getElementById('at-token').value.trim();
  const base=document.getElementById('at-base').value.trim();
  const table=document.getElementById('at-table').value.trim()||'Design Links';
  if(!token||!base){alert('Please enter your token and base ID.');return;}
  atConfig={token,base,table};
  localStorage.setItem('pcdh-at-config',JSON.stringify(atConfig));
  hideConfig();
  document.getElementById('config-banner').style.display='none';
  fetchFromAirtable();
}

async function fetchFromAirtable(){
  if(!atConfig)return;
  isLoading=true;renderGrid([]);
  try{
    const r=await fetch(`https://api.airtable.com/v0/${atConfig.base}/${encodeURIComponent(atConfig.table)}?sort[0][field]=Date&sort[0][direction]=desc`,{headers:{Authorization:`Bearer ${atConfig.token}`}});
    const data=await r.json();
    if(data.records){
      links=data.records.map(rec=>({
        id:rec.id,title:rec.fields['Project name']||'',type:rec.fields['Link type']||'Figma Make',
        url:rec.fields['URL']||'',designer:rec.fields['Designer']||'',
        category:rec.fields['Category']||'Route Optimization',desc:rec.fields['Description']||'',
        date:fmtDate(rec.fields['Date']||''),
      }));
    }
  }catch(e){console.error('Airtable fetch error:',e);}
  isLoading=false;render();
}

async function addToAirtable(link){
  if(!atConfig)return null;
  const r=await fetch(`https://api.airtable.com/v0/${atConfig.base}/${encodeURIComponent(atConfig.table)}`,{
    method:'POST',headers:{Authorization:`Bearer ${atConfig.token}`,'Content-Type':'application/json'},
    body:JSON.stringify({fields:{'Project name':link.title,'Link type':link.type,'URL':link.url,'Designer':link.designer,'Category':link.category,'Description':link.desc,'Date':new Date().toISOString().split('T')[0]}})
  });
  const data=await r.json();return data.id||null;
}

async function deleteFromAirtable(id){
  if(!atConfig)return;
  await fetch(`https://api.airtable.com/v0/${atConfig.base}/${encodeURIComponent(atConfig.table)}/${id}`,{method:'DELETE',headers:{Authorization:`Bearer ${atConfig.token}`}});
}

async function addLink(){
  const title=document.getElementById('f-title').value.trim();
  const url=document.getElementById('f-url').value.trim();
  const designer=document.getElementById('f-designer').value.trim();
  if(!title||!url||!designer){alert('Please fill in project name, URL, and designer.');return;}
  const date=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  const link={id:'local-'+Date.now(),title,type:document.getElementById('f-type').value,url,designer,category:document.getElementById('f-category').value,desc:document.getElementById('f-desc').value.trim(),date};
  if(atConfig){const atId=await addToAirtable(link);if(atId)link.id=atId;}
  links.unshift(link);
  if(!atConfig)localStorage.setItem('pcdh-local-links',JSON.stringify(links));
  ['f-title','f-url','f-designer','f-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-category').selectedIndex=0;
  document.getElementById('form-wrap').classList.remove('open');
  render();
}

async function deleteLink(id){
  if(atConfig)await deleteFromAirtable(id);
  links=links.filter(l=>l.id!==id);
  if(!atConfig)localStorage.setItem('pcdh-local-links',JSON.stringify(links));
  render();
}

function renderGrid(filtered){
  const g=document.getElementById('grid');
  if(isLoading){g.innerHTML='<div class="loading">Loading from Airtable...</div>';return;}
  if(filtered.length===0){g.innerHTML='<div class="empty">No links found. Add one above.</div>';return;}
  g.innerHTML=filtered.map(l=>{
    const cs=getCatStyle(l.category);
    return `<div class="card">
      <div class="card-top">
        <span style="font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;background:${cs.bg};color:${cs.txt}">${l.category}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:11px;color:#999">${l.date||''}</span>
          <button class="del-btn" onclick="deleteLink('${l.id}')" title="Remove">&#x2715;</button>
        </div>
      </div>
      <div>
        <div class="card-title">${l.title}</div>
        ${l.desc?`<div class="card-desc">${l.desc}</div>`:''}
        <span class="type-badge">${l.type}</span>
      </div>
      <div class="card-footer">
        <div class="designer">
          <div class="avatar">${initials(l.designer)}</div>
          <span class="designer-name">${l.designer}</span>
        </div>
        <a class="open-btn" href="${l.url}" target="_blank">Open ↗</a>
      </div>
    </div>`;
  }).join('');
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const ft=document.getElementById('filter-type').value;
  const allCats=['All','Route Optimization','Chemical Tracking','Recurring Services'];
  document.getElementById('pill-row').innerHTML=allCats.map(c=>{
    const cs=c==='All'?null:getCatStyle(c);
    const isActive=activeCat===c;
    const bg=isActive?(c==='All'?'#395B50':(cs?cs.bg:'#395B50')):'transparent';
    const txt=isActive?(c==='All'?'#fff':(cs?cs.txt:'#fff')):'#666';
    const border=isActive?(c==='All'?'#395B50':(cs?cs.bg:'#395B50')):'#ccc';
    return `<button style="font-size:12px;padding:4px 12px;border-radius:20px;border:0.5px solid ${border};background:${bg};color:${txt};cursor:pointer;font-weight:${isActive?'500':'400'}" onclick="setCat('${c}')">${c}</button>`;
  }).join('');
  const filtered=links.filter(l=>{
    const mq=!q||l.title.toLowerCase().includes(q)||l.designer.toLowerCase().includes(q)||(l.category||'').toLowerCase().includes(q);
    const mt=!ft||l.type===ft;
    const mc=activeCat==='All'||l.category===activeCat;
    return mq&&mt&&mc;
  });
  renderGrid(filtered);
  const makes=links.filter(l=>l.type==='Figma Make').length;
  const protos=links.filter(l=>l.type==='Prototype').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Total links</div><div class="stat-val">${links.length}</div></div>
    <div class="stat"><div class="stat-label">Figma Make</div><div class="stat-val">${makes}</div></div>
    <div class="stat"><div class="stat-label">Prototypes</div><div class="stat-val">${protos}</div></div>`;
}

function setCat(c){activeCat=c;render();}

function init(){
  const saved=localStorage.getItem('pcdh-at-config');
  if(saved){atConfig=JSON.parse(saved);fetchFromAirtable();}
  else{
    const local=localStorage.getItem('pcdh-local-links');
    links=local?JSON.parse(local):SAMPLE;
    document.getElementById('config-banner').style.display='block';
    render();
  }
}
init();
</script>
</body>
</html>
